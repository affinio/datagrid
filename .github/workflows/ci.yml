name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality-gates:
    name: datagrid-quality-gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: pnpm install --frozen-lockfile
      - run: pnpm run quality:lock:datagrid:parity
