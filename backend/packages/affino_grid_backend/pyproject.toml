[project]
name = "affino-grid-backend"
version = "0.1.0"
description = "Reusable grid backend core for Affino"
requires-python = ">=3.11"
dependencies = [
    "sqlalchemy>=2.0.44",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["affino_grid_backend"]
